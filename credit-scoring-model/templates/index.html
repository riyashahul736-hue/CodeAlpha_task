<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Scoring AI Model</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e3a8a,#06b6d4);
        }

        .container{
            width:450px;
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-top:10px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🏦 Credit Scoring AI Model</h1>
    <p>Enter your details for AI prediction</p>

    <form action="/predict" method="post">

        <label>Age</label>
        <input type="number" name="age" required>

        <label>Monthly Income</label>
        <input type="number" name="income" required>

        <label>Loan Amount</label>
        <input type="number" name="loan" required>

        <label>Existing Debt</label>
        <input type="number" name="debt" required>

        <button type="submit">Predict Risk</button>

    </form>

</div>

</body>
</html>
